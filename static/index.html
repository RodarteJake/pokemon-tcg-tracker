<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Pokémon TCG Collection</title>
  <meta name="description" content="A personal Pokémon Trading Card Game collection tracker with live pricing, value-by-set breakdown, and gain/loss tracking.">
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <h1>
    <img src="/static/favicon.png" alt="" class="title-icon">
    PKMNTCG Tracker
  </h1>

  <div class="auth-bar">
    <button id="login-button" class="auth-only-loggedout auth-link">Log in</button>
    <span class="auth-required auth-bar-status">
    <span id="auth-username"></span> · <button id="logout-button" class="auth-link">Log out</button>
  </span>
  </div>

  <main>
<div class="search-panel">
      <div class="filter-row">
        <div class="filter">
          <label for="filter-name">Name</label>
          <input type="text" id="filter-name" placeholder="e.g. Arcanine">
        </div>
        <div class="filter">
          <label id="label-set">Set</label>
          <div class="searchable-dropdown" data-filter="set" role="combobox" aria-labelledby="label-set"></div>
        </div>
        <div class="filter">
          <label id="label-rarity">Rarity</label>
          <div class="searchable-dropdown" data-filter="rarity" role="combobox" aria-labelledby="label-rarity"></div>
        </div>
        <div class="filter">
          <label id="label-type">Type</label>
          <div class="searchable-dropdown" data-filter="type" role="combobox" aria-labelledby="label-type"></div>
        </div>
        <div class="filter">
          <label id="label-supertype">Supertype</label>
          <div class="searchable-dropdown" data-filter="supertype" role="combobox" aria-labelledby="label-supertype"></div>
        </div>
      </div>

      <button class="advanced-toggle" id="advanced-toggle" type="button">
        <span id="advanced-toggle-icon">▸</span> Advanced filters
      </button>

      <div class="filter-row advanced-filters" id="advanced-filters">
        <div class="filter">
          <label id="label-subtype">Subtype</label>
          <div class="searchable-dropdown" data-filter="subtype" role="combobox" aria-labelledby="label-subtype"></div>
        </div>
        <div class="filter">
          <label for="filter-series">Series</label>
          <input type="text" id="filter-series" placeholder="e.g. Sword & Shield">
        </div>
        <div class="filter">
          <label for="filter-artist">Artist</label>
          <input type="text" id="filter-artist" placeholder="e.g. Mitsuhiro Arita">
        </div>
        <div class="filter filter-narrow">
          <label for="filter-hp-min">HP min</label>
          <input type="number" id="filter-hp-min" min="0" placeholder="0">
        </div>
        <div class="filter filter-narrow">
          <label for="filter-hp-max">HP max</label>
          <input type="number" id="filter-hp-max" min="0" placeholder="500">
        </div>
      </div>

      <div class="search-controls">
        <select id="page-size-select" aria-label="Results per page">
          <option value="12">12 per page</option>
          <option value="24">24 per page</option>
          <option value="48">48 per page</option>
        </select>
        <button id="clear-filters">Clear</button>
        <button id="search-button">Search</button>
      </div>
    </div>

    <div id="search-results"></div>

    <div id="pagination" class="pagination"></div>

    <div class="price-status auth-required" id="price-status">
      <span class="price-status-label">
        Prices last updated: <span id="price-status-date">…</span>
      </span>
      <button id="refresh-prices-button">Refresh prices</button>
    </div>

    <div class="stats-bar auth-required" id="stats-bar">Loading stats...</div>

    <h2 id="by-set-header" class="auth-required">Value by Set</h2>
    <div class="by-set auth-required" id="by-set">Loading...</div>

    <h2 id="cards-header" class="auth-required">Cards</h2>
    <div id="cards-container" class="auth-required">Loading...</div>

    <div id="empty-state" class="auth-required">
      <div class="empty-icon">📭</div>
      <div class="empty-title">Your collection is empty</div>
      <div class="empty-subtitle">Search for a card above and click "Add to Collection" to get started.</div>
    </div>
  </main>

  <!-- Acquire modal -->
  <div id="modal-overlay">
    <div id="modal-panel">
      <button id="modal-close">×</button>
      <div id="modal-card-preview"></div>
      <form id="acquire-form">
        <label>
          Quantity
          <input type="number" id="form-quantity" value="1" min="1" required>
        </label>
        <label>
          Purchase price ($)
          <input type="number" id="form-price" step="0.01" min="0" placeholder="What did you pay?">
        </label>
        <label>
          Condition
          <select id="form-condition">
            <option value="Near Mint">Near Mint</option>
            <option value="Lightly Played">Lightly Played</option>
            <option value="Moderately Played">Moderately Played</option>
            <option value="Heavily Played">Heavily Played</option>
            <option value="Damaged">Damaged</option>
          </select>
        </label>
        <label>
          Acquired date
          <input type="date" id="form-date">
        </label>
        <button type="submit" id="form-submit">Add to Collection</button>
      </form>
    </div>
  </div>

  <!-- Login modal -->
  <div id="login-overlay">
    <div id="login-panel">
      <button id="login-close">×</button>
      <h2 id="auth-modal-title" class="login-title">Log in</h2>
      <p id="auth-modal-subtitle" class="login-subtitle">Welcome back.</p>

      <form id="login-form">
        <label>
          Username or email
          <input type="text" id="login-identifier" autocomplete="username" required>
        </label>
        <label>
          Password
          <div class="password-input-field">
            <input type="password" id="login-password" autocomplete="current-password" required>
            <button type="button" id="login-show-password" class="password-toggle" aria-label="Show password">
              <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>     
              </svg>
              <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
                <line x1="2" x2="22" y1="2" y2="22"/>  
              </svg>
            </button>
          </div>
        </label>
        <button type="submit" id="login-submit">Log in</button>
      </form>

      <form id="register-form" style="display: none;">
        <label>
          Username
          <input type="text" id="register-username" autocomplete="username" required>
        </label>
        <label>
          Email
          <input type="email" id="register-email" autocomplete="email" required>
        </label>
        <label>
          Password
          <div class="password-input-field">
            <input type="password" id="register-password" autocomplete="new-password" required>
            <button type="button" id="register-show-password" class="password-toggle" aria-label="Show password">
              <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>     
              </svg>
              <svg class="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
                <line x1="2" x2="22" y1="2" y2="22"/>  
              </svg>
            </button>
          </div>
        </label>
        <button type="submit" id="register-submit">Register</button>
      </form>

      <div id="login-error" class="login-error"></div>

      <p class="auth-modal-footer">
        <span id="auth-modal-footer-prompt">No account?</span>
        <button id="auth-modal-toggle" type="button" class="auth-link">Register</button>
      </p>
    </div>
  </div>

  <!-- Card detail modal -->
  <div id="detail-overlay">
    <div id="detail-panel">
      <button id="detail-close">×</button>
      <div id="detail-card-info"></div>
      <h3 id="detail-ownership-header">Your copies</h3>
      <div id="detail-ownership-list"></div>
    </div>
  </div>

  <script type="module" src="/static/main.js"></script>
</body>
</html>
