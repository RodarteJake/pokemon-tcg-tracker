<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Pokémon TCG Collection</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <h1>
    <img src="/static/favicon.png" alt="" class="title-icon">
    PKMNTCG Tracker
  </h1>

  <div class="search-panel">
    <div class="filter-row">
      <div class="filter">
        <label>Name</label>
        <input type="text" id="filter-name" placeholder="e.g. Arcanine">
      </div>
      <div class="filter">
        <label>Set</label>
        <div class="searchable-dropdown" data-filter="set"></div>
      </div>
      <div class="filter">
        <label>Rarity</label>
        <div class="searchable-dropdown" data-filter="rarity"></div>
      </div>
      <div class="filter">
        <label>Type</label>
        <div class="searchable-dropdown" data-filter="type"></div>
      </div>
      <div class="filter">
        <label>Supertype</label>
        <div class="searchable-dropdown" data-filter="supertype"></div>
      </div>
    </div>

    <button class="advanced-toggle" id="advanced-toggle" type="button">
      <span id="advanced-toggle-icon">▸</span> Advanced filters
    </button>

    <div class="filter-row advanced-filters" id="advanced-filters">
      <div class="filter">
        <label>Subtype</label>
        <div class="searchable-dropdown" data-filter="subtype"></div>
      </div>
      <div class="filter">
        <label>Series</label>
        <input type="text" id="filter-series" placeholder="e.g. Sword & Shield">
      </div>
      <div class="filter">
        <label>Artist</label>
        <input type="text" id="filter-artist" placeholder="e.g. Mitsuhiro Arita">
      </div>
      <div class="filter filter-narrow">
        <label>HP min</label>
        <input type="number" id="filter-hp-min" min="0" placeholder="0">
      </div>
      <div class="filter filter-narrow">
        <label>HP max</label>
        <input type="number" id="filter-hp-max" min="0" placeholder="500">
      </div>
    </div>

    <div class="search-controls">
      <select id="page-size-select">
        <option value="12">12 per page</option>
        <option value="24">24 per page</option>
        <option value="48">48 per page</option>
      </select>
      <button id="clear-filters">Clear</button>
      <button id="search-button">Search</button>
    </div>
  </div>

  <div id="search-results"></div>

  <div id="pagination" class="pagination"></div>

  <!-- Acquire modal -->
  <div id="modal-overlay">
    <div id="modal-panel">
      <button id="modal-close">×</button>
      <div id="modal-card-preview"></div>
      <form id="acquire-form">
        <label>
          Quantity
          <input type="number" id="form-quantity" value="1" min="1" required>
        </label>
        <label>
          Purchase price ($)
          <input type="number" id="form-price" step="0.01" min="0" placeholder="What did you pay?">
        </label>
        <label>
          Condition
          <select id="form-condition">
            <option value="Near Mint">Near Mint</option>
            <option value="Lightly Played">Lightly Played</option>
            <option value="Moderately Played">Moderately Played</option>
            <option value="Heavily Played">Heavily Played</option>
            <option value="Damaged">Damaged</option>
          </select>
        </label>
        <label>
          Acquired date
          <input type="date" id="form-date">
        </label>
        <button type="submit" id="form-submit">Add to Collection</button>
      </form>
    </div>
  </div>

  <!-- Card detail modal -->
  <div id="detail-overlay">
    <div id="detail-panel">
      <button id="detail-close">×</button>
      <div id="detail-card-info"></div>
      <h3 id="detail-ownership-header"></h3>
      <div id="detail-ownership-list"></div>
    </div>
  </div>

  <div class="price-status" id="price-status">
    <span class="price-status-label">
      Prices last updated: <span id="price-status-date">…</span>
    </span>
    <button id="refresh-prices-button">Refresh prices</button>
  </div>

  <div class="stats-bar" id="stats-bar">Loading stats...</div>

  <h2 id="by-set-header">Value by Set</h2>
  <div class="by-set" id="by-set">Loading...</div>

  <h2 id="cards-header">Cards</h2>
  <div id="cards-container">Loading...</div>

  <div id="empty-state">
    <div class="empty-icon">📭</div>
    <div class="empty-title">Your collection is empty</div>
    <div class="empty-subtitle">Search for a card above and click "Add to Collection" to get started.</div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
