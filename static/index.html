<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Pokémon TCG Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", -apple-system, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 32px;
      min-height: 100vh;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 32px 0;
      color: white;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #94a3b8;
      text-transform: uppercase;
      margin: 40px 0 16px 0;
    }

    /* --- Stats --- */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 20px;
      border-radius: 8px;
    }

    .stat-label {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .stat-value {
      font-family: "JetBrains Mono", monospace;
      font-size: 28px;
      font-weight: 700;
      margin-top: 6px;
      letter-spacing: -0.02em;
      color: white;
    }

    .stat-value.positive { color: #10b981; }
    .stat-value.negative { color: #ef4444; }

    /* --- By-set list --- */
    .by-set {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      overflow: hidden;
    }

    .by-set-row {
      display: flex;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid #334155;
      font-size: 14px;
    }

    .by-set-row:last-child { border-bottom: none; }

    .by-set-row .set-name {
      font-weight: 500;
      color: #e2e8f0;
    }

    .by-set-row .value {
      font-family: "JetBrains Mono", monospace;
      color: #10b981;
      font-weight: 700;
      font-size: 14px;
    }

    /* --- Card grid --- */
    #cards-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
      transition: border-color 0.15s ease, transform 0.15s ease;
      cursor: pointer;
    }

    .card:hover {
      border-color: #38bdf8;
      transform: translateY(-2px);
    }

    .card img {
      width: 100%;
      border-radius: 4px;
      display: block;
    }

    .card-name {
      font-weight: 600;
      margin-top: 12px;
      color: white;
      font-size: 14px;
    }

    .card-set {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 2px;
    }

    .card-price {
      font-family: "JetBrains Mono", monospace;
      margin-top: 10px;
      color: #10b981;
      font-weight: 700;
      font-size: 16px;
    }

    /* --- Search --- */
    .search-section {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    #search-input {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      font-family: "Inter", sans-serif;
      font-size: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      outline: none;
    }

    #search-input:focus { border-color: #38bdf8; }

    #search-button {
      background: #38bdf8;
      color: #0f172a;
      border: none;
      font-family: "Inter", sans-serif;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
    }

    #search-button:hover { background: #0ea5e9; }

    #search-results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    #search-results:empty { display: none; }

    .search-result {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .search-result img {
      width: 100%;
      border-radius: 4px;
    }

    .search-result .card-name {
      font-weight: 600;
      color: white;
      margin-top: 8px;
      font-size: 14px;
    }

    .search-result .card-set {
      font-size: 12px;
      color: #94a3b8;
    }

    .add-button {
      margin-top: 10px;
      width: 100%;
      background: #10b981;
      color: white;
      border: none;
      font-family: "Inter", sans-serif;
      font-weight: 600;
      font-size: 13px;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .add-button:hover { background: #059669; }

    /* --- Modal --- */
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    #modal-overlay.open { display: flex; }

    #modal-panel {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
      position: relative;
    }

    #modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: transparent;
      border: none;
      color: #94a3b8;
      font-size: 24px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 6px;
    }

    #modal-close:hover {
      background: #334155;
      color: white;
    }

    #modal-card-preview {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #334155;
    }

    #modal-card-preview img {
      width: 80px;
      border-radius: 4px;
    }

    #modal-card-preview .preview-name {
      font-weight: 600;
      color: white;
      font-size: 16px;
    }

    #modal-card-preview .preview-set {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 2px;
    }

    #acquire-form label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      margin-bottom: 16px;
    }

    #acquire-form input,
    #acquire-form select {
      display: block;
      width: 100%;
      margin-top: 6px;
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      font-family: "Inter", sans-serif;
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 6px;
      outline: none;
      text-transform: none;
      letter-spacing: normal;
      font-weight: 400;
    }

    #acquire-form input:focus,
    #acquire-form select:focus { border-color: #38bdf8; }

    #form-submit {
      width: 100%;
      background: #10b981;
      color: white;
      border: none;
      font-family: "Inter", sans-serif;
      font-weight: 600;
      font-size: 14px;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
    }

    #form-submit:hover { background: #059669; }

    #form-submit:disabled {
      opacity: 0.5;
      cursor: wait;
    }

    #page-size-select {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      font-family: "Inter", sans-serif;
      font-size: 14px;
      padding: 12px 16px;
      border-radius: 8px;
      outline: none;
      cursor: pointer;
    }

    #page-size-select:focus { border-color: #38bdf8; }

    .pagination {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #94a3b8;
    }

    .pagination.visible { display: flex; }

    .pagination button {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      font-family: "Inter", sans-serif;
      font-weight: 600;
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    .pagination button:hover:not(:disabled) {
      border-color: #38bdf8;
    }

    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .pagination .page-info {
      font-variant-numeric: tabular-nums;
    }

  </style>
</head>
<body>
  <h1>PKMNTCG Tracker</h1>

  <div class="search-section">
    <input type="text" id="search-input" placeholder="Search for a card to add...">
    <select id="page-size-select">
      <option value="12">12 per page</option>
      <option value="24">24 per page</option>
      <option value="48">48 per page</option>
    </select>
    <button id="search-button">Search</button>
  </div>

  <div id="search-results"></div>

  <div id="pagination" class="pagination"></div>

  <div id="modal-overlay">
    <div id="modal-panel">
      <button id="modal-close">×</button>
      <div id="modal-card-preview"></div>
      <form id="acquire-form">
        <label>
          Quantity
          <input type="number" id="form-quantity" value="1" min="1" required>
        </label>
        <label>
          Purchase price ($)
          <input type="number" id="form-price" step="0.01" min="0" placeholder="What did you pay?">
        </label>
        <label>
          Condition
          <select id="form-condition">
            <option value="Near Mint">Near Mint</option>
            <option value="Lightly Played">Lightly Played</option>
            <option value="Moderately Played">Moderately Played</option>
            <option value="Heavily Played">Heavily Played</option>
            <option value="Damaged">Damaged</option>
          </select>
        </label>
        <label>
          Acquired date
          <input type="date" id="form-date">
        </label>
        <button type="submit" id="form-submit">Add to Collection</button>
      </form>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar">Loading stats...</div>

  <h2>Value by Set</h2>
  <div class="by-set" id="by-set">Loading...</div>

  <h2>Cards</h2>
  <div id="cards-container">Loading...</div>

  <script>
    // -------- Data loaders --------

    async function loadStats() {
      const [valueRes, spentRes] = await Promise.all([
        fetch("/stats/total-value"),
        fetch("/stats/total-spent")
      ]);
      const { total_value } = await valueRes.json();
      const { total_spent } = await spentRes.json();
      const gain = total_value - total_spent;
      const gainClass = gain >= 0 ? "positive" : "negative";
      const gainSign = gain >= 0 ? "+" : "";

      document.getElementById("stats-bar").innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Value</div>
          <div class="stat-value positive">$${total_value.toFixed(2)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Spent</div>
          <div class="stat-value">$${total_spent.toFixed(2)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Gain / Loss</div>
          <div class="stat-value ${gainClass}">${gainSign}$${gain.toFixed(2)}</div>
        </div>
      `;
    }

    async function loadBySet() {
      const response = await fetch("/stats/by-set");
      const sets = await response.json();
      const container = document.getElementById("by-set");
      container.innerHTML = "";
      for (const row of sets) {
        const div = document.createElement("div");
        div.className = "by-set-row";
        div.innerHTML = `
          <span class="set-name">${row.set_name}</span>
          <span class="value">$${row.set_value.toFixed(2)}</span>
        `;
        container.appendChild(div);
      }
    }

    async function loadCards() {
      const response = await fetch("/cards");
      const cards = await response.json();
      const container = document.getElementById("cards-container");
      container.innerHTML = "";
      for (const card of cards) {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <img src="${card.image_url}" alt="${card.name}">
          <div class="card-name">${card.name}</div>
          <div class="card-set">${card.set_name}</div>
          <div class="card-price">$${card.market_price.toFixed(2)}</div>
        `;
        container.appendChild(div);
      }
    }

    function refreshAll() {
      loadStats();
      loadBySet();
      loadCards();
    }

// -------- Search & pagination --------

let searchState = {
  query: "",
  page: 1,
  pageSize: 12,
  totalCount: 0,
};

async function doSearch(resetPage = true) {
  const input = document.getElementById("search-input");
  const query = input.value.trim();
  if (!query) return;

  if (resetPage) {
    searchState.query = query;
    searchState.page = 1;
    searchState.pageSize = parseInt(document.getElementById("page-size-select").value, 10);
  }

  const container = document.getElementById("search-results");
  const pagination = document.getElementById("pagination");
  container.innerHTML = "Searching...";
  pagination.classList.remove("visible");

  try {
    const url = `/api/search?name=${encodeURIComponent(searchState.query)}&page=${searchState.page}&page_size=${searchState.pageSize}`;
    const response = await fetch(url);
    const envelope = await response.json();

    searchState.totalCount = envelope.totalCount;
    const results = envelope.data;

    container.innerHTML = "";

    if (results.length === 0) {
      container.textContent = "No cards found.";
      return;
    }

    for (const card of results) {
      const div = document.createElement("div");
      div.className = "search-result";
      div.innerHTML = `
        <img src="${card.images.small}" alt="${card.name}">
        <div class="card-name">${card.name}</div>
        <div class="card-set">${card.set.name} · #${card.number}</div>
        <button class="add-button">Add to Collection</button>
      `;
      container.appendChild(div);
      div.querySelector(".add-button").addEventListener("click", () => openModal(card));
    }

    renderPagination();
  } catch (e) {
    container.textContent = "Search failed: " + e.message;
  }
}

function renderPagination() {
  const pagination = document.getElementById("pagination");
  const totalPages = Math.max(1, Math.ceil(searchState.totalCount / searchState.pageSize));

  if (searchState.totalCount <= searchState.pageSize) {
    pagination.classList.remove("visible");
    return;
  }

  pagination.innerHTML = `
    <button id="prev-page" ${searchState.page === 1 ? "disabled" : ""}>← Previous</button>
    <span class="page-info">Page ${searchState.page} of ${totalPages} (${searchState.totalCount} results)</span>
    <button id="next-page" ${searchState.page >= totalPages ? "disabled" : ""}>Next →</button>
  `;
  pagination.classList.add("visible");

  document.getElementById("prev-page").addEventListener("click", () => {
    if (searchState.page > 1) {
      searchState.page -= 1;
      doSearch(false);
    }
  });

  document.getElementById("next-page").addEventListener("click", () => {
    searchState.page += 1;
    doSearch(false);
  });
}

    function openModal(card) {
      currentAcquireCard = card;
      document.getElementById("modal-card-preview").innerHTML = `
        <img src="${card.images.small}" alt="${card.name}">
        <div>
          <div class="preview-name">${card.name}</div>
          <div class="preview-set">${card.set.name} · #${card.number}</div>
        </div>
      `;
      document.getElementById("form-date").value = new Date().toISOString().slice(0, 10);
      document.getElementById("modal-overlay").classList.add("open");
    }

    function closeModal() {
      document.getElementById("modal-overlay").classList.remove("open");
      currentAcquireCard = null;
    }

    // -------- Event wiring --------

    document.getElementById("search-button").addEventListener("click", doSearch);
    document.getElementById("search-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doSearch();
    });

    document.getElementById("modal-close").addEventListener("click", closeModal);
    document.getElementById("modal-overlay").addEventListener("click", (e) => {
      if (e.target.id === "modal-overlay") closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

    document.getElementById("acquire-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentAcquireCard) return;

      const submitBtn = document.getElementById("form-submit");
      submitBtn.disabled = true;
      submitBtn.textContent = "Adding...";

      const body = {
        card_id: currentAcquireCard.id,
        quantity: parseInt(document.getElementById("form-quantity").value, 10),
        purchase_price: parseFloat(document.getElementById("form-price").value) || null,
        condition: document.getElementById("form-condition").value,
        acquired_date: document.getElementById("form-date").value || null,
      };

      try {
        const response = await fetch("/collection/acquire", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (!response.ok) throw new Error("Server error");
        closeModal();
        refreshAll();
      } catch (err) {
        alert("Failed to add card: " + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Add to Collection";
      }
    });

    // -------- Initial load --------
    refreshAll();
  </script>
</body>
</html>
